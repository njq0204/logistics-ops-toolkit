name: 自动经营分析报告

on:
  schedule:
    - cron: '0 1 * * 1'   # 每周一 09:00 (UTC+8 约)
  workflow_dispatch:         # 支持手动触发

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 生成示例数据
        run: python scripts/generate_sample_data.py

      - name: 运行分析
        run: python main.py

      - name: 上传报告产物
        uses: actions/upload-artifact@v4
        with:
          name: logistics-report
          path: |
            output/charts/
            output/reports/
            output/export/
            output/dashboard/
          retention-days: 30
